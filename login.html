<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustVault - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #0f172a, #1d4ed8); color: #fff; }
        .auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .auth-card { width: min(460px, 100%); background: rgba(255,255,255,0.95); color: #111827; border-radius: 18px; padding: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.25); }
        .auth-card h1 { margin-top: 0; font-size: 28px; }
        .auth-card p { color: #4b5563; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e0; box-sizing: border-box; }
        .form-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
        .btn-primary { background: #2563eb; color: white; border: none; padding: 12px 18px; border-radius: 10px; cursor: pointer; }
        .link-btn { background: none; border: none; color: #2563eb; cursor: pointer; }
        .helper-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; }
        .message { margin-top: 14px; padding: 10px 12px; border-radius: 8px; display: none; }
        .message.success { background: #dcfce7; color: #166534; display: block; }
        .message.error { background: #fee2e2; color: #991b1b; display: block; }
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <h1><i class="fa-solid fa-shield-halved"></i> TrustVault Access</h1>
            <p>Securely access your investor-ready document workspace.</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <div class="helper-row">
                    <label><input type="checkbox" id="rememberMe"> Remember Me</label>
                    <button type="button" class="link-btn" id="forgotPasswordBtn">Forgot Password?</button>
                </div>
                <div class="form-actions">
                    <a href="register.html">Create account</a>
                    <button type="submit" class="btn-primary">Sign In</button>
                </div>
            </form>
            <div id="authMessage" class="message"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
