<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustVault - My Documents</title>
    <!-- FontAwesome for professional icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Style Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/documents.css">
</head>
<body>

    <div class="dashboard-container">
        <!-- ✅ Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fa-solid fa-shield-halved"></i>
                <h2>TrustVault</h2>
            </div>
            <nav class="sidebar-menu">
                <ul>
                    <li><a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
                    <li class="active"><a href="documents.html"><i class="fa-solid fa-file-lines"></i> Documents</a></li>
                    <li><a href="#"><i class="fa-solid fa-file-signature"></i> Contracts</a></li>
                    <li><a href="#"><i class="fa-solid fa-comments"></i> Chat</a></li>
                    <li><a href="#"><i class="fa-solid fa-bell"></i> Notifications</a></li>
                    <li><a href="#"><i class="fa-solid fa-gear"></i> Settings</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- 🔍 Top Bar (Search & User Profile) -->
            <header class="top-bar">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="search" placeholder="Search documents, categories, or notes...">
                </div>
                <div class="user-wrapper">
                    <div class="user-info">
                        <h4>User Name</h4>
                        <small>Administrator</small>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff" alt="User Profile" class="user-avatar">
                </div>
            </header>

            <!-- 📄 Main Content Inner -->
            <div class="content-body">
                <!-- 📄 Documents Header -->
                <section class="documents-header">
                    <div class="header-title">
                        <h1><i class="fa-solid fa-file-lines"></i> My Documents</h1>
                        <p>Manage and organize all your important documents in one secure place</p>
                    </div>
                    <a href="upload.html" class="btn-upload">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Upload Document
                    </a>
                </section>

                <!-- 📋 Document Cards Grid -->
                <section class="documents-grid" id="documentsGrid"></section>
            </div>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/documents.js"></script>
</body>
</html>
